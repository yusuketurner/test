<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カスタム＆クラフト - お住まいに手作りインテリアを</title>
    <style>
        /* CSS Custom Properties */
        :root {
            --color-primary: #8B6914;
            --color-primary-light: #C4952A;
            --color-bg: #FAF8F5;
            --color-bg-dark: #4A3728;
            --color-text: #2C2C2C;
            --color-text-light: #666666;
            --color-text-muted: #999999;
            --color-white: #FFFFFF;
            --color-hero-overlay: rgba(0, 0, 0, 0.3);
            --font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
            --spacing-xxl: 5rem;
            --border-radius: 4px;
            --transition: all 0.3s ease;
        }

        /* Reset & Base */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            font-size: 14px;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* =============================
           NAVIGATION
        ============================= */
        nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) var(--spacing-lg);
        }

        .nav-logo {
            color: var(--color-white);
            font-size: 0.75rem;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 0.05em;
        }

        .nav-logo span {
            display: block;
            font-size: 0.65rem;
            font-weight: 400;
            opacity: 0.9;
        }

        .nav-links {
            display: flex;
            gap: var(--spacing-md);
            list-style: none;
        }

        .nav-links a {
            color: var(--color-white);
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            opacity: 0.9;
            transition: var(--transition);
        }

        .nav-links a:hover {
            opacity: 1;
        }

        /* =============================
           HERO SECTION
        ============================= */
        .hero {
            position: relative;
            min-height: 420px;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
            background: linear-gradient(135deg, #5C4033 0%, #3E2723 40%, #8D6E63 100%);
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="%235C4033"/><rect x="10" y="0" width="3" height="100" fill="%234A3728" opacity="0.5"/><rect x="25" y="0" width="2" height="100" fill="%234A3728" opacity="0.4"/><rect x="40" y="0" width="4" height="100" fill="%234A3728" opacity="0.3"/><rect x="58" y="0" width="2" height="100" fill="%234A3728" opacity="0.5"/><rect x="72" y="0" width="3" height="100" fill="%234A3728" opacity="0.4"/><rect x="85" y="0" width="2" height="100" fill="%234A3728" opacity="0.3"/></svg>') repeat;
            background-size: auto, 100px 100px;
        }

        /* Decorative wood panel lines */
        .hero-wood-panels {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 45%;
            overflow: hidden;
        }

        .hero-wood-panels::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent 0px,
                transparent 18px,
                rgba(60,30,10,0.3) 18px,
                rgba(60,30,10,0.3) 20px
            ),
            linear-gradient(180deg, #7D5A3C 0%, #5C3D1E 50%, #8B6343 100%);
        }

        .hero-furniture {
            position: absolute;
            right: 5%;
            bottom: 0;
            width: 40%;
            height: 85%;
            background: transparent;
        }

        /* Sofa illustration */
        .hero-sofa {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 300px;
            height: 160px;
        }

        .hero-sofa::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px;
            right: 20px;
            height: 80px;
            background: #D4B896;
            border-radius: 8px 8px 0 0;
        }

        .hero-sofa::after {
            content: '';
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            height: 90px;
            background: #C8A882;
            border-radius: 8px;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            padding: var(--spacing-xl) var(--spacing-lg);
            max-width: 50%;
        }

        .hero-title {
            color: var(--color-white);
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: var(--spacing-md);
            letter-spacing: 0.02em;
        }

        .hero-btn {
            display: inline-block;
            background-color: var(--color-primary-light);
            color: var(--color-white);
            padding: 0.6rem 1.5rem;
            border-radius: var(--border-radius);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            transition: var(--transition);
            font-weight: 500;
        }

        .hero-btn:hover {
            background-color: var(--color-primary);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139, 105, 20, 0.4);
        }

        /* =============================
           SECTION: CRAFTSMANSHIP
        ============================= */
        .section-craftsmanship {
            padding: var(--spacing-xxl) var(--spacing-lg);
            background-color: var(--color-white);
        }

        .craftsmanship-inner {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-xl);
            align-items: center;
        }

        .craftsmanship-text h2 {
            font-size: clamp(1.4rem, 3vw, 1.8rem);
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: var(--spacing-md);
            line-height: 1.3;
        }

        .craftsmanship-text p {
            font-size: 0.8rem;
            color: var(--color-text-light);
            line-height: 1.8;
        }

        .craftsmanship-image {
            position: relative;
        }

        .craftsmanship-image img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: var(--border-radius);
        }

        /* Folding chair image placeholder */
        .img-placeholder {
            width: 100%;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: #f0ebe3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-chair {
            height: 260px;
            background: linear-gradient(135deg, #F5ECD7 0%, #E8D5B7 100%);
            position: relative;
        }

        /* Chair SVG */
        .chair-svg {
            width: 100%;
            height: 100%;
        }

        /* =============================
           SECTION: FUNCTIONALITY
        ============================= */
        .section-functionality {
            padding: var(--spacing-xxl) var(--spacing-lg);
            background-color: var(--color-bg);
        }

        .section-functionality .section-inner {
            max-width: 900px;
            margin: 0 auto;
        }

        .section-header {
            margin-bottom: var(--spacing-xl);
        }

        .section-header h2 {
            font-size: clamp(1.3rem, 3vw, 1.7rem);
            font-weight: 700;
            color: var(--color-text);
            line-height: 1.3;
            margin-bottom: var(--spacing-md);
        }

        .btn-outline {
            display: inline-block;
            border: 1.5px solid var(--color-primary-light);
            color: var(--color-primary-light);
            padding: 0.5rem 1.3rem;
            border-radius: var(--border-radius);
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            transition: var(--transition);
        }

        .btn-outline:hover {
            background-color: var(--color-primary-light);
            color: var(--color-white);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .product-card {
            background: var(--color-white);
            border-radius: var(--border-radius);
            overflow: hidden;
            transition: var(--transition);
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .product-card-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .product-card-img-placeholder {
            width: 100%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-card-img-1 {
            background: linear-gradient(135deg, #E8E0D5 0%, #D4C9B8 100%);
        }

        .product-card-img-2 {
            background: linear-gradient(135deg, #2D4A3E 0%, #1A3028 100%);
        }

        .product-card-img-3 {
            background: linear-gradient(135deg, #F0E8E0 0%, #E8D8CC 100%);
        }

        .product-card-body {
            padding: var(--spacing-sm);
        }

        .product-card-body h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: var(--spacing-xs);
        }

        .product-card-body p {
            font-size: 0.73rem;
            color: var(--color-text-light);
            line-height: 1.6;
        }

        /* =============================
           SECTION: TESTIMONIALS
        ============================= */
        .section-testimonials {
            padding: var(--spacing-xxl) var(--spacing-lg);
            background-color: var(--color-white);
        }

        .section-testimonials .section-inner {
            max-width: 900px;
            margin: 0 auto;
        }

        .section-testimonials h2 {
            font-size: clamp(1.3rem, 3vw, 1.7rem);
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: var(--spacing-xl);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-md);
        }

        .testimonial-card {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .testimonial-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: var(--border-radius);
        }

        .testimonial-img-placeholder {
            width: 100%;
            height: 160px;
            border-radius: var(--border-radius);
            overflow: hidden;
        }

        .testimonial-img-1 {
            background: linear-gradient(135deg, #8B6914 0%, #5C4033 100%);
        }

        .testimonial-img-2 {
            background: linear-gradient(135deg, #C4952A 0%, #8B6343 100%);
        }

        .testimonial-img-3 {
            background: linear-gradient(135deg, #E8E0D5 0%, #D0C0A8 100%);
        }

        .testimonial-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-text);
        }

        .testimonial-role {
            font-size: 0.7rem;
            color: var(--color-text-muted);
            margin-top: -0.3rem;
        }

        .testimonial-text {
            font-size: 0.73rem;
            color: var(--color-text-light);
            line-height: 1.7;
        }

        /* =============================
           SECTION: CONTACT / CTA
        ============================= */
        .section-contact {
            background: var(--color-bg-dark);
            padding: var(--spacing-xxl) var(--spacing-lg);
            position: relative;
            overflow: hidden;
        }

        .section-contact::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #3E2A1A 0%, #4A3020 50%, #5C3D20 100%);
            opacity: 0.8;
        }

        /* Decorative food/plant in corner */
        .section-contact-decoration {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 35%;
            height: 100%;
            background: linear-gradient(135deg, #6B4226 0%, #8B5A2B 100%);
            clip-path: polygon(30% 0%, 100% 0%, 100% 100%, 0% 100%);
            opacity: 0.6;
        }

        .section-contact .section-inner {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
        }

        .section-contact h2 {
            color: var(--color-white);
            font-size: clamp(1.3rem, 3vw, 1.8rem);
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: var(--spacing-xl);
        }

        .contact-info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-lg);
        }

        .contact-info-item h4 {
            color: rgba(255,255,255,0.7);
            font-size: 0.7rem;
            font-weight: 400;
            margin-bottom: var(--spacing-xs);
            letter-spacing: 0.05em;
        }

        .contact-info-item p {
            color: var(--color-white);
            font-size: 0.8rem;
            line-height: 1.6;
        }

        .contact-info-item a {
            color: var(--color-white);
            transition: var(--transition);
        }

        .contact-info-item a:hover {
            color: var(--color-primary-light);
        }

        /* =============================
           PRODUCT IMAGES (SVG-based)
        ============================= */
        /* Cutlery icon for stoneware */
        .icon-cutlery {
            color: #8B7355;
        }

        /* Chair icon */
        .icon-chair {
            color: #2D4A3E;
        }

        /* Interior icon */
        .icon-interior {
            color: #B8997A;
        }

        /* =============================
           RESPONSIVE
        ============================= */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero-content {
                max-width: 100%;
            }

            .hero-wood-panels {
                display: none;
            }

            .craftsmanship-inner {
                grid-template-columns: 1fr;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .testimonials-grid {
                grid-template-columns: 1fr;
            }

            .contact-info-grid {
                grid-template-columns: 1fr;
                gap: var(--spacing-md);
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .testimonials-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* =============================
           DECORATIVE ELEMENTS
        ============================= */
        /* Lamp in hero */
        .hero-lamp {
            position: absolute;
            right: 20%;
            top: 10%;
            width: 30px;
            height: 120px;
        }

        /* Wood slats in hero */
        .wood-slats {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 45%;
            overflow: hidden;
        }

        .wood-slats-inner {
            position: absolute;
            inset: 0;
            display: flex;
            gap: 2px;
        }

        .wood-slat {
            flex: 1;
            background: linear-gradient(180deg, #8B6343 0%, #6B4226 50%, #8B6343 100%);
            opacity: 0.85;
        }

        .wood-slat:nth-child(even) {
            background: linear-gradient(180deg, #6B4226 0%, #5C3520 50%, #6B4226 100%);
            opacity: 0.9;
        }

        /* Hero room scene */
        .hero-scene {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 55%;
            height: 100%;
            overflow: hidden;
        }

        .hero-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(180deg, #C4A882 0%, #B8976A 100%);
        }

        .hero-wall {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 30%;
            background: repeating-linear-gradient(
                90deg,
                #8B6343 0px,
                #7A5535 15px,
                #6B4A2E 16px,
                #8B6343 31px
            );
        }

        .hero-armchair {
            position: absolute;
            bottom: 28%;
            left: 10%;
            width: 180px;
            height: 120px;
        }
    </style>
</head>
<body>

    <!-- =============================
         HERO SECTION
    ============================= -->
    <header style="position: relative; min-height: 420px; overflow: hidden; background: #4A3020;">

        <!-- Wood panel background -->
        <div class="wood-slats">
            <div class="wood-slats-inner">
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
                <div class="wood-slat"></div>
            </div>
        </div>

        <!-- Room scene overlay -->
        <div class="hero-scene">
            <div class="hero-wall"></div>
            <div class="hero-floor"></div>

            <!-- Armchair SVG -->
            <svg class="hero-armchair" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
                <!-- Chair back -->
                <rect x="30" y="20" width="140" height="70" rx="8" fill="#D4B896" />
                <!-- Chair seat -->
                <rect x="20" y="80" width="160" height="30" rx="6" fill="#C8A882" />
                <!-- Armrests -->
                <rect x="10" y="60" width="25" height="55" rx="8" fill="#B8976A" />
                <rect x="165" y="60" width="25" height="55" rx="8" fill="#B8976A" />
                <!-- Legs -->
                <rect x="35" y="105" width="12" height="30" rx="3" fill="#8B6343" />
                <rect x="153" y="105" width="12" height="30" rx="3" fill="#8B6343" />
                <!-- Cushion detail -->
                <rect x="40" y="35" width="120" height="45" rx="5" fill="#DBBF9A" opacity="0.6" />
            </svg>

            <!-- Lamp -->
            <svg style="position:absolute; right: 15%; top: 5%; width: 40px; height: 200px;" viewBox="0 0 40 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Shade -->
                <ellipse cx="20" cy="30" rx="20" ry="6" fill="#E8D5B0" />
                <path d="M0 30 L5 65 L35 65 L40 30 Z" fill="#F0E0C0" />
                <ellipse cx="20" cy="65" rx="15" ry="4" fill="#D4C0A0" />
                <!-- Stand -->
                <rect x="18" y="65" width="4" height="120" fill="#8B7355" rx="2" />
                <!-- Base -->
                <ellipse cx="20" cy="188" rx="15" ry="5" fill="#6B5535" />
            </svg>
        </div>

        <!-- Navigation -->
        <nav>
            <div class="nav-logo">
                カスタム<br><span>＆クラフト</span>
            </div>
            <ul class="nav-links">
                <li><a href="#">ホーム</a></li>
                <li><a href="#">製品</a></li>
                <li><a href="#">について</a></li>
                <li><a href="#">お問い合わせ</a></li>
            </ul>
        </nav>

        <!-- Hero Content -->
        <div class="hero-content" style="position: relative; z-index: 10; padding: 5rem 2rem 3rem; max-width: 50%;">
            <h1 class="hero-title">お住まいに<br>手作りインテリアを</h1>
            <a href="#" class="hero-btn">もっと詳しく見る</a>
        </div>
    </header>

    <!-- =============================
         SECTION: CRAFTSMANSHIP
    ============================= -->
    <section class="section-craftsmanship">
        <div class="craftsmanship-inner">
            <div class="craftsmanship-text">
                <h2>こだわりの<br>精巧さ</h2>
                <p>
                    世界中で選ばれる高品質なカスタム＆クラフトの製品は、
                    どれも精密さです。特に以一番本格的な仕上げています。
                    素材から製品まで、全ての工程に厳格な品質管理を施しています。
                    お客様のニーズに合わせたカスタマイズオプションも豊富に揃えており、
                    独自のデザインを実現することができます。どんなライフスタイルにも
                    馴染む製品で、空間をより豊かなスタイルに変えてくれます。
                </p>
            </div>
            <div class="craftsmanship-image">
                <!-- Folding chair image -->
                <div class="img-placeholder img-chair">
                    <svg viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:260px;">
                        <!-- Background -->
                        <rect width="240" height="280" fill="#F5ECD7" />

                        <!-- Folding chair -->
                        <!-- Back frame left -->
                        <line x1="80" y1="40" x2="70" y2="200" stroke="#8B6343" stroke-width="6" stroke-linecap="round"/>
                        <!-- Back frame right -->
                        <line x1="150" y1="40" x2="160" y2="200" stroke="#8B6343" stroke-width="6" stroke-linecap="round"/>

                        <!-- Back slats -->
                        <rect x="72" y="55" width="86" height="8" rx="3" fill="#A0784A"/>
                        <rect x="71" y="75" width="88" height="8" rx="3" fill="#A0784A"/>
                        <rect x="70" y="95" width="90" height="8" rx="3" fill="#A0784A"/>
                        <rect x="69" y="115" width="92" height="8" rx="3" fill="#A0784A"/>

                        <!-- Seat -->
                        <path d="M65 155 L175 155 L170 180 L70 180 Z" fill="#B08860" rx="3"/>
                        <!-- Seat slats -->
                        <rect x="68" y="158" width="104" height="6" rx="2" fill="#A0784A" opacity="0.7"/>
                        <rect x="69" y="168" width="102" height="6" rx="2" fill="#A0784A" opacity="0.7"/>

                        <!-- Front legs -->
